<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦞</text></svg>">

  <!-- SEO -->
  {% seo %}

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Cayman base styles -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">

  <style>
    /* ── CSS 变量系统 ── */
    :root {
      /* 主色调 - 深海蓝绿 */
      --color-primary: #0a5f5f;
      --color-primary-dark: #074747;
      --color-primary-light: #0d7a7a;

      /* 强调色 - 珊瑚橙 */
      --color-accent: #ff6b5b;
      --color-accent-light: #ff8a7a;
      --color-accent-dark: #e55545;

      /* 背景色 */
      --color-bg: #fafbfc;
      --color-bg-alt: #f0f4f4;
      --color-bg-dark: #0a1414;

      /* 文本色 */
      --color-text: #1a2024;
      --color-text-secondary: #5a6b70;
      --color-text-muted: #8a9ba0;

      /* 边框色 */
      --color-border: #e0e8e8;
      --color-border-light: #f0f4f4;

      /* 阴影 */
      --shadow-sm: 0 1px 2px rgba(10, 20, 20, 0.04);
      --shadow-md: 0 4px 12px rgba(10, 20, 20, 0.08);
      --shadow-lg: 0 12px 32px rgba(10, 20, 20, 0.12);
      --shadow-xl: 0 24px 64px rgba(10, 20, 20, 0.16);

      /* 圆角 */
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --radius-full: 9999px;

      /* 间距 */
      --space-xs: 0.5rem;
      --space-sm: 0.75rem;
      --space-md: 1rem;
      --space-lg: 1.5rem;
      --space-xl: 2rem;
      --space-2xl: 3rem;
    }

    /* ── 黑暗模式 ── */
    [data-theme="dark"] {
      /* 主色调 - 调整为更亮的蓝绿 */
      --color-primary: #0d9a9a;
      --color-primary-dark: #0a7a7a;
      --color-primary-light: #10baba;

      /* 强调色 - 保持珊瑚橙但调整亮度 */
      --color-accent: #ff8a7a;
      --color-accent-light: #ffb5a8;
      --color-accent-dark: #ff6b5b;

      /* 背景色 - 深色系 */
      --color-bg: #0d1418;
      --color-bg-alt: #151e24;
      --color-bg-dark: #fafbfc;

      /* 文本色 - 反转 */
      --color-text: #e8eaed;
      --color-text-secondary: #a8b8bd;
      --color-text-muted: #6a7a7f;

      /* 边框色 - 深色系 */
      --color-border: #2a3a40;
      --color-border-light: #1e2a30;

      /* 阴影 - 深色系 */
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.5);
      --shadow-xl: 0 24px 64px rgba(0, 0, 0, 0.6);
    }

    /* ── 主题切换过渡 ── */
    body {
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* ── 主题切换按钮 ── */
    .theme-toggle {
      position: fixed;
      top: 2rem;
      right: 2rem;
      width: 44px;
      height: 44px;
      border-radius: var(--radius-full);
      background: var(--color-bg);
      border: 2px solid var(--color-border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1000;
      box-shadow: var(--shadow-md);
    }

    .theme-toggle:hover {
      transform: scale(1.1);
      box-shadow: var(--shadow-lg);
      border-color: var(--color-accent);
    }

    .theme-toggle:active {
      transform: scale(0.95);
    }

    /* 图标动画 */
    .theme-toggle .icon {
      transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    .theme-toggle:hover .icon {
      transform: rotate(20deg) scale(1.1);
    }

    /* 响应式调整 */
    @media screen and (max-width: 42em) {
      .theme-toggle {
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        font-size: 1.1rem;
      }
    }

    /* ── 全局样式 ── */
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC",
                   "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--color-text);
      background: var(--color-bg);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* 噪点纹理背景 */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      opacity: 0.015;
      pointer-events: none;
      z-index: 9999;
    }

    /* ── 顶部 Banner ── */
    .page-header {
      background: linear-gradient(135deg, var(--color-bg-dark) 0%, #0d2020 50%, var(--color-primary-dark) 100%);
      padding: 4rem 2rem 3rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* 网格背景 */
    .page-header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* 渐变光晕 */
    .page-header::after {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 80%;
      height: 200%;
      background: radial-gradient(ellipse at center, rgba(255,107,91,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .page-header > * {
      position: relative;
      z-index: 1;
    }

    .page-header .project-name {
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #ffffff 0%, rgba(255,255,255,0.85) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeInUp 0.6s ease-out;
    }

    .page-header .project-tagline {
      font-size: 1.15rem;
      color: rgba(255,255,255,0.75);
      margin-top: 0.75rem;
      font-weight: 400;
      animation: fadeInUp 0.6s ease-out 0.1s backwards;
    }

    /* 导航按钮 */
    .btn-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1.5rem;
      animation: fadeInUp 0.6s ease-out 0.2s backwards;
    }

    .page-header .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.65rem 1.2rem;
      font-size: 0.9rem;
      font-weight: 500;
      font-family: 'Space Grotesk', sans-serif;
      color: rgba(255,255,255,0.85);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius-md);
      text-decoration: none;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(10px);
    }

    .page-header .btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.35);
      color: #fff;
      text-decoration: none;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    .page-header .btn:active {
      transform: translateY(0);
    }

    /* 搜索框 */
    .header-search {
      margin: 2rem auto 1rem;
      max-width: 560px;
      animation: fadeInUp 0.6s ease-out 0.15s backwards;
    }

    .search-form {
      display: flex;
      gap: 0.5rem;
      background: rgba(255,255,255,0.08);
      padding: 0.35rem;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
    }

    .search-input {
      flex: 1;
      padding: 0.7rem 1rem;
      font-size: 0.95rem;
      border: none;
      border-radius: var(--radius-md);
      background: rgba(255,255,255,0.95);
      outline: none;
      transition: all 0.2s;
      font-family: inherit;
    }

    .search-input:focus {
      background: #fff;
      box-shadow: 0 0 0 3px rgba(255,107,91,0.15);
    }

    .search-submit {
      padding: 0.7rem 1.4rem;
      font-size: 0.92rem;
      font-weight: 600;
      font-family: 'Space Grotesk', sans-serif;
      background: var(--color-accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.25s;
      white-space: nowrap;
    }

    .search-submit:hover {
      background: var(--color-accent-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(255,107,91,0.3);
    }

    /* ── 正文区域 ── */
    .main-content {
      max-width: 64rem;
      padding: 3rem 4rem;
      margin: 0 auto;
      font-size: 1.05rem;
      line-height: 1.8;
    }

    /* 标题 */
    .main-content h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.25rem;
      font-weight: 700;
      color: var(--color-primary-dark);
      margin-top: 0;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--color-border);
      letter-spacing: -0.5px;
    }

    .main-content h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--color-primary);
      margin-top: 3rem;
      margin-bottom: 1.25rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--color-border-light);
      letter-spacing: -0.3px;
    }

    .main-content h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--color-text);
      margin-top: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: -0.2px;
    }

    .main-content h4 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--color-text);
      margin-top: 2rem;
      margin-bottom: 0.75rem;
    }

    /* 链接 */
    .main-content a {
      color: var(--color-primary);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: all 0.2s;
      position: relative;
    }

    .main-content a:hover {
      color: var(--color-accent);
      border-bottom-color: var(--color-accent);
    }

    /* 表格 */
    .main-content table {
      display: block;
      width: 100%;
      overflow-x: auto;
      border-collapse: separate;
      border-spacing: 0;
      margin: 1.5rem 0;
      font-size: 0.94rem;
      border-radius: var(--radius-md);
      border: 1px solid var(--color-border);
      background: var(--color-bg);
    }

    .main-content table thead {
      background: linear-gradient(135deg, var(--color-primary-dark) 0%, var(--color-primary) 100%);
    }

    .main-content table th {
      color: #fff;
      font-weight: 600;
      padding: 0.85rem 1.1rem;
      text-align: left;
      white-space: nowrap;
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0.3px;
    }

    .main-content table th:first-child {
      border-radius: var(--radius-md) 0 0 0;
    }

    .main-content table th:last-child {
      border-radius: 0 var(--radius-md) 0 0;
    }

    .main-content table td {
      padding: 0.75rem 1.1rem;
      border-bottom: 1px solid var(--color-border-light);
      border-right: 1px solid var(--color-border-light);
      vertical-align: top;
    }

    .main-content table td:last-child {
      border-right: none;
    }

    .main-content table tr:last-child td {
      border-bottom: none;
    }

    .main-content table tr:last-child td:first-child {
      border-radius: 0 0 0 var(--radius-md);
    }

    .main-content table tr:last-child td:last-child {
      border-radius: 0 0 var(--radius-md) 0;
    }

    .main-content table tbody tr {
      transition: background 0.2s;
    }

    .main-content table tbody tr:nth-child(even) {
      background: var(--color-bg-alt);
    }

    .main-content table tbody tr:hover {
      background: rgba(255,107,91,0.04);
    }

    /* 代码块 */
    .main-content code {
      padding: 0.2rem 0.5rem;
      font-family: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace;
      font-size: 0.875em;
      color: var(--color-accent-dark);
      background: rgba(255,107,91,0.08);
      border-radius: 4px;
      border: 1px solid rgba(255,107,91,0.15);
    }

    .main-content pre {
      padding: 1.25rem 1.5rem;
      margin: 1.5rem 0;
      font-family: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace;
      font-size: 0.89rem;
      line-height: 1.65;
      color: #e0e6e6;
      background: linear-gradient(135deg, #0d1a1a 0%, #0a1414 100%);
      border-radius: var(--radius-md);
      overflow-x: auto;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: var(--shadow-lg);
    }

    .main-content pre > code {
      padding: 0;
      color: inherit;
      background: transparent;
      border: none;
      font-size: inherit;
      border-radius: 0;
    }

    /* 引用块 */
    .main-content blockquote {
      margin: 1.5rem 0;
      padding: 1rem 1.4rem;
      background: linear-gradient(135deg, rgba(10,95,95,0.05) 0%, rgba(255,107,91,0.03) 100%);
      border-left: 4px solid var(--color-accent);
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
      color: var(--color-text-secondary);
      position: relative;
    }

    .main-content blockquote::before {
      content: '"';
      position: absolute;
      top: 0.25rem;
      left: 0.75rem;
      font-size: 2.5rem;
      color: var(--color-accent);
      opacity: 0.2;
      font-family: Georgia, serif;
      line-height: 1;
    }

    .main-content blockquote p {
      margin: 0;
      position: relative;
      z-index: 1;
    }

    /* 图片 */
    .main-content img {
      max-width: 100%;
      height: auto;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
      margin: 1.25rem 0;
      border: 1px solid var(--color-border-light);
    }

    /* 徽章图片 */
    .main-content img[src*="shields.io"],
    .main-content img[src*="img.shields"] {
      box-shadow: none;
      border-radius: 0;
      border: none;
      margin: 0 3px;
      display: inline-block;
      vertical-align: middle;
    }

    /* 水平线 */
    .main-content hr {
      border: none;
      border-top: 2px solid var(--color-border);
      margin: 3rem 0;
      position: relative;
    }

    .main-content hr::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60px;
      height: 4px;
      background: var(--color-accent);
      border-radius: var(--radius-full);
    }

    /* 列表 */
    .main-content ul, .main-content ol {
      padding-left: 1.5rem;
      margin: 1rem 0;
    }

    .main-content li {
      margin: 0.5rem 0;
      position: relative;
    }

    .main-content ul li::marker {
      color: var(--color-accent);
    }

    .main-content ol li::marker {
      color: var(--color-primary);
      font-weight: 600;
    }

    /* ── 页脚 ── */
    .site-footer {
      padding: 2.5rem 0 2rem;
      margin-top: 4rem;
      border-top: 1px solid var(--color-border);
      text-align: center;
      font-size: 0.9rem;
      color: var(--color-text-secondary);
      background: var(--color-bg-alt);
    }

    .site-footer p {
      margin: 0.5rem 0;
    }

    .site-footer a {
      color: var(--color-primary);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: all 0.2s;
    }

    .site-footer a:hover {
      color: var(--color-accent);
      border-bottom-color: var(--color-accent);
    }

    /* ── 动画 ── */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── 面包屑导航 ── */
    .breadcrumb {
      padding: 0.75rem 0;
      margin-bottom: 2rem;
      font-size: 0.85rem;
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.3rem;
    }

    .breadcrumb-item {
      display: inline-flex;
      align-items: center;
      transition: all 0.2s;
    }

    .breadcrumb-item a {
      color: var(--color-text-secondary);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: all 0.2s;
    }

    .breadcrumb-item a:hover {
      color: var(--color-accent);
      border-bottom-color: var(--color-accent);
    }

    .breadcrumb-item.active {
      color: var(--color-primary);
      font-weight: 600;
    }

    .breadcrumb-separator {
      color: var(--color-text-muted);
      margin: 0 0.25rem;
      font-size: 0.75rem;
    }

    /* 面包屑图标 */
    .breadcrumb-icon {
      margin-right: 0.3rem;
      font-size: 0.9rem;
    }

    /* ── 侧边目录导航 ── */
    .toc-sidebar {
      position: sticky;
      top: 2rem;
      max-height: calc(100vh - 4rem);
      overflow-y: auto;
      padding: 1.25rem;
      background: var(--color-bg-alt);
      border-radius: var(--radius-md);
      border: 1px solid var(--color-border);
      font-size: 0.85rem;
    }

    .toc-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--color-primary-dark);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--color-accent);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .toc-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .toc-item {
      margin: 0.4rem 0;
    }

    .toc-item a {
      color: var(--color-text-secondary);
      text-decoration: none;
      display: block;
      padding: 0.35rem 0.5rem;
      border-radius: var(--radius-sm);
      transition: all 0.2s;
      border-left: 2px solid transparent;
    }

    .toc-item a:hover {
      color: var(--color-accent);
      background: rgba(255,107,91,0.06);
      border-left-color: var(--color-accent);
      transform: translateX(2px);
    }

    .toc-item.level-2 {
      padding-left: 1rem;
    }

    .toc-item.level-3 {
      padding-left: 2rem;
    }

    /* 主内容布局 */
    .content-wrapper {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 2.5rem;
      align-items: start;
    }

    .content-main {
      min-width: 0;
    }

    /* ── 返回顶部按钮 ── */
    .back-to-top {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 48px;
      height: 48px;
      background: var(--color-accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-full);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      box-shadow: var(--shadow-lg);
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1000;
    }

    .back-to-top.visible {
      opacity: 1;
      visibility: visible;
    }

    .back-to-top:hover {
      background: var(--color-accent-dark);
      transform: translateY(-4px);
      box-shadow: var(--shadow-xl);
    }

    /* ── 阅读进度条 ── */
    .reading-progress {
      position: fixed;
      top: 0;
      left: 0;
      width: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--color-accent) 0%, var(--color-accent-light) 100%);
      z-index: 9999;
      transition: width 0.1s ease-out;
    }

    /* ── 响应式 ── */
    @media screen and (max-width: 64em) {
      .main-content {
        padding: 2.5rem 2rem;
      }
      .page-header .project-name {
        font-size: 2.2rem;
      }
    }

    @media screen and (max-width: 42em) {
      .main-content {
        padding: 2rem 1.25rem;
        font-size: 1rem;
      }
      .page-header {
        padding: 3rem 1rem 2rem;
      }
      .page-header .project-name {
        font-size: 1.9rem;
      }
      .page-header .project-tagline {
        font-size: 1rem;
      }
      .btn-group {
        gap: 0.4rem;
      }
      .page-header .btn {
        padding: 0.55rem 0.9rem;
        font-size: 0.85rem;
      }
      .header-search {
        margin: 1.5rem 0 0;
      }
      .search-input, .search-submit {
        font-size: 0.88rem;
        padding: 0.6rem 0.85rem;
      }
      .main-content h1 {
        font-size: 1.8rem;
      }
      .main-content h2 {
        font-size: 1.35rem;
      }
      .main-content h3 {
        font-size: 1.15rem;
      }
      .main-content table {
        font-size: 0.85rem;
      }
      .main-content table th,
      .main-content table td {
        padding: 0.6rem 0.8rem;
      }
      .content-wrapper {
        grid-template-columns: 1fr;
      }
      .toc-sidebar {
        display: none;
      }
    }
  </style>

  <script>
    // 面包屑导航生成
    document.addEventListener('DOMContentLoaded', function() {
      const content = document.querySelector('.main-content');
      if (!content) return;

      // 生成面包屑
      generateBreadcrumbs();

      // 生成侧边目录
      generateTOC();

      // 滚动高亮目录项
      setupScrollSpy();

      // 添加阅读进度条
      setupReadingProgress();

      // 添加返回顶部按钮
      setupBackToTop();
    });

    function generateBreadcrumbs() {
      const path = window.location.pathname;
      if (path === '/' || path === '/index.html' || path === '') return;

      const content = document.querySelector('.main-content');
      const h1 = content.querySelector('h1');
      if (!h1) return;

      const breadcrumb = document.createElement('nav');
      breadcrumb.className = 'breadcrumb';
      breadcrumb.setAttribute('aria-label', '面包屑导航');

      const pathParts = path.split('/').filter(p => p && p !== 'index.html');
      const title = h1.textContent.trim();

      let html = '<span class="breadcrumb-item"><a href="/" class="breadcrumb-icon">🏠</a></span>';

      let currentPath = '';
      pathParts.forEach((part, index) => {
        currentPath += '/' + part;
        const isLast = index === pathParts.length - 1;

        html += '<span class="breadcrumb-separator">›</span>';

        if (isLast) {
          html += `<span class="breadcrumb-item active">${title}</span>`;
        } else {
          const displayName = part.replace('.html', '').replace(/-/g, ' ');
          html += `<span class="breadcrumb-item"><a href="${currentPath}">${displayName}</a></span>`;
        }
      });

      breadcrumb.innerHTML = html;

      // 移除旧的面包屑
      const oldBreadcrumb = content.querySelector('.breadcrumb');
      if (oldBreadcrumb) oldBreadcrumb.remove();

      // 插入新的面包屑
      content.insertBefore(breadcrumb, h1);
    }

    function generateTOC() {
      const content = document.querySelector('.main-content');
      if (!content) return;

      const headers = content.querySelectorAll('h2, h3, h4');
      if (headers.length < 3) return; // 章节太少时不显示目录

      let tocHtml = '<div class="toc-title">📑 目录</div>';
      tocHtml += '<ul class="toc-list">';

      headers.forEach(header => {
        const level = parseInt(header.tagName.charAt(1));
        const text = header.textContent.trim();
        const id = header.id || text.toLowerCase().replace(/[^\w\u4e00-\u9fa5]+/g, '-');

        if (!header.id) {
          header.id = id;
        }

        tocHtml += `<li class="toc-item level-${level}"><a href="#${id}">${text}</a></li>`;
      });

      tocHtml += '</ul>';

      // 检查是否已有侧边栏
      const sidebar = document.querySelector('.toc-sidebar');
      if (sidebar) {
        sidebar.innerHTML = tocHtml;
        return;
      }

      // 创建包装容器
      const wrapper = document.createElement('div');
      wrapper.className = 'content-wrapper';

      // 侧边栏
      const newSidebar = document.createElement('aside');
      newSidebar.className = 'toc-sidebar';
      newSidebar.innerHTML = tocHtml;

      // 主内容区
      const mainContent = document.createElement('div');
      mainContent.className = 'content-main';

      // 移动所有内容到主内容区
      while (content.firstChild) {
        mainContent.appendChild(content.firstChild);
      }

      // 组装
      wrapper.appendChild(mainContent);
      wrapper.appendChild(newSidebar);
      content.appendChild(wrapper);
    }

    function setupScrollSpy() {
      const tocLinks = document.querySelectorAll('.toc-item a');
      const headers = document.querySelectorAll('.main-content h2, .main-content h3, .main-content h4');

      if (tocLinks.length === 0 || headers.length === 0) return;

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const id = entry.target.id;
            tocLinks.forEach(link => {
              link.style.color = '';
              link.style.borderLeftColor = '';
            });

            const activeLink = document.querySelector(`.toc-item a[href="#${id}"]`);
            if (activeLink) {
              activeLink.style.color = 'var(--color-accent)';
              activeLink.style.borderLeftColor = 'var(--color-accent)';
            }
          }
        });
      }, {
        rootMargin: '-20% 0px -80% 0px'
      });

      headers.forEach(header => observer.observe(header));
    }

    function setupReadingProgress() {
      // 创建进度条
      const progressBar = document.createElement('div');
      progressBar.className = 'reading-progress';
      document.body.appendChild(progressBar);

      // 更新进度
      window.addEventListener('scroll', () => {
        const windowHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        const scrolled = (window.scrollY / windowHeight) * 100;
        progressBar.style.width = scrolled + '%';
      });
    }

    function setupBackToTop() {
      // 创建返回顶部按钮
      const backToTop = document.createElement('button');
      backToTop.className = 'back-to-top';
      backToTop.innerHTML = '↑';
      backToTop.setAttribute('aria-label', '返回顶部');
      document.body.appendChild(backToTop);

      // 显示/隐藏按钮
      window.addEventListener('scroll', () => {
        if (window.scrollY > 300) {
          backToTop.classList.add('visible');
        } else {
          backToTop.classList.remove('visible');
        }
      });

      // 点击返回顶部
      backToTop.addEventListener('click', () => {
        window.scrollTo({
          top: 0,
          behavior: 'smooth'
        });
      });
    }
  </script>
</head>
<body>
  <header class="page-header" role="banner">
    <!-- 主题切换按钮 -->
    <button class="theme-toggle" id="theme-toggle" aria-label="切换主题">
      <span class="icon">🌙</span>
    </button>

    <h1 class="project-name">🦞 {{ site.title }}</h1>
    <h2 class="project-tagline">{{ site.description }}</h2>

    <div class="header-search">
      <form action="{{ '/search' | relative_url }}" method="get" class="search-form">
        <input type="text" name="q" placeholder="🔍 搜索教程内容..." class="search-input" autocomplete="off">
        <button type="submit" class="search-submit">搜索</button>
      </form>
    </div>

    <div class="btn-group">
      <a href="{{ site.github.repository_url }}" class="btn">⭐ GitHub</a>
      <a href="{{ '/' | relative_url }}" class="btn">🏠 首页</a>
      <a href="{{ '/docs/01-basics/02-installation' | relative_url }}" class="btn">🚀 安装</a>
      <a href="{{ '/docs/01-basics/03-quick-start' | relative_url }}" class="btn">⚡ 快速开始</a>
      <a href="{{ '/appendix/A-command-reference' | relative_url }}" class="btn">📋 命令速查</a>
    </div>
  </header>

  <main id="content" class="main-content" role="main">
    {{ content }}

    <footer class="site-footer">
      <p>
        由 <a href="https://github.com/xianyu110">@xianyu110</a> 维护 ·
        基于 <a href="https://openclaw.ai">OpenClaw 2026.3.12</a> ·
        采用 <a href="https://www.gnu.org/licenses/gpl-3.0.html">GPL-3.0 License</a>
      </p>
      <p>
        <a href="https://openclaw.ai">官网</a> ·
        <a href="https://docs.openclaw.ai">文档</a> ·
        <a href="https://clawhub.ai">ClawHub</a> ·
        <a href="https://github.com/xianyu110/awesome-openclaw-tutorial/issues">反馈问题</a>
      </p>
    </footer>
  </main>

  <script>
    // ── 黑暗模式切换 ──
    (function() {
      const themeToggle = document.getElementById('theme-toggle');
      const themeIcon = themeToggle.querySelector('.icon');

      // 从 localStorage 读取主题偏好
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

      // 设置初始主题
      function setTheme(theme) {
        if (theme === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
          themeIcon.textContent = '☀️';
          localStorage.setItem('theme', 'dark');
        } else {
          document.documentElement.removeAttribute('data-theme');
          themeIcon.textContent = '🌙';
          localStorage.setItem('theme', 'light');
        }
      }

      // 初始化主题
      if (savedTheme) {
        setTheme(savedTheme);
      } else if (prefersDark) {
        setTheme('dark');
      }

      // 主题切换事件
      themeToggle.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        setTheme(newTheme);

        // 添加旋转动画效果
        themeIcon.style.transform = 'rotate(360deg)';
        setTimeout(() => {
          themeIcon.style.transform = '';
        }, 500);
      });

      // 监听系统主题变化
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
        if (!localStorage.getItem('theme')) {
          setTheme(e.matches ? 'dark' : 'light');
        }
      });
    })();
  </script>
</body>
</html>
